version: "3.9"

services:
  db:
    image: postgres:18-bookworm
    container_name: financial_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-financial_system}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-financial_system}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: financial_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-8080}:8080"
    volumes:
      - ./.env.docker:/app/.env:ro

volumes:
  postgres_data:

