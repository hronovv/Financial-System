basePath: /
definitions:
  financial_system_internal_domain.Account:
    properties:
      account_number:
        type: string
      balance:
        type: number
      bank_id:
        type: integer
      created_at:
        type: string
      id:
        type: integer
      is_blocked:
        type: boolean
      user_id:
        type: integer
    type: object
  financial_system_internal_domain.ActionLog:
    properties:
      action_type:
        type: string
      created_at:
        type: string
      details:
        items:
          type: integer
        type: array
      id:
        type: integer
      is_undone:
        type: boolean
      user_id:
        type: integer
    type: object
  financial_system_internal_domain.Bank:
    properties:
      id:
        type: integer
      name:
        type: string
    type: object
  financial_system_internal_domain.Deposit:
    properties:
      balance:
        type: number
      bank_id:
        type: integer
      created_at:
        type: string
      id:
        type: integer
      interest_rate:
        type: number
      is_blocked:
        type: boolean
      user_id:
        type: integer
    type: object
  financial_system_internal_domain.Enterprise:
    properties:
      balance:
        type: number
      id:
        type: integer
      name:
        type: string
    type: object
  financial_system_internal_domain.EnterpriseWithEmployees:
    properties:
      employee_user_ids:
        items:
          type: integer
        type: array
      enterprise:
        $ref: '#/definitions/financial_system_internal_domain.Enterprise'
    type: object
  financial_system_internal_domain.SalaryApplication:
    properties:
      amount:
        type: number
      created_at:
        type: string
      enterprise_id:
        type: integer
      id:
        type: integer
      paid_at:
        type: string
      status:
        type: string
      updated_at:
        type: string
      user_id:
        type: integer
    type: object
  financial_system_internal_domain.Transaction:
    properties:
      amount:
        type: number
      created_at:
        type: string
      from_account_id:
        type: integer
      from_deposit_id:
        type: integer
      id:
        type: integer
      to_account_id:
        type: integer
      to_deposit_id:
        type: integer
      transaction_type:
        type: string
    type: object
  internal_transport_rest.accumulateDepositRequest:
    properties:
      amount:
        example: 500
        type: number
      from_account_id:
        example: 10
        type: integer
    type: object
  internal_transport_rest.addEmployeeToEnterpriseRequest:
    properties:
      user_id:
        example: 3
        type: integer
    type: object
  internal_transport_rest.applySalaryProjectRequest:
    properties:
      amount:
        example: 50000
        type: number
      enterprise_id:
        example: 1
        type: integer
    type: object
  internal_transport_rest.authInputDTO:
    properties:
      email:
        example: user@example.com
        type: string
      password:
        example: password123
        type: string
    type: object
  internal_transport_rest.openAccountRequest:
    properties:
      bank_id:
        example: 1
        type: integer
    type: object
  internal_transport_rest.openDepositRequest:
    properties:
      bank_id:
        example: 1
        type: integer
      interest_rate:
        example: 5.5
        type: number
    type: object
  internal_transport_rest.receiveSalaryRequest:
    properties:
      application_id:
        example: 1
        type: integer
      to_account_id:
        example: 5
        type: integer
      to_deposit_id:
        example: 2
        type: integer
    type: object
  internal_transport_rest.transferFromAccountRequest:
    properties:
      amount:
        example: 100.5
        type: number
      from_account_id:
        example: 10
        type: integer
      to_account_id:
        example: 11
        type: integer
      to_deposit_id:
        example: 5
        type: integer
    type: object
  internal_transport_rest.transferFromDepositRequest:
    properties:
      amount:
        example: 100.5
        type: number
      from_deposit_id:
        example: 3
        type: integer
      to_account_id:
        example: 10
        type: integer
      to_deposit_id:
        example: 5
        type: integer
    type: object
host: localhost:8080
info:
  contact: {}
  description: Finance management API. Client, manager and admin roles.
  title: Financial System API
  version: "1.0"
paths:
  /admin/logs:
    get:
      description: Returns all action_logs ordered by created_at desc.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/financial_system_internal_domain.ActionLog'
            type: array
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: All action logs
      tags:
      - admin
  /admin/logs/{id}/undo:
    post:
      description: Logical undo of the action by log entry. Not for auth_sign_up/auth_sign_in.
      parameters:
      - description: Log entry ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Undo action
      tags:
      - admin
  /admin/logs/undo-all:
    post:
      description: Undoes every undoable client/manager action (newest first). Skips
        auth_sign_up, auth_sign_in and already undone.
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Undo all actions
      tags:
      - admin
  /auth/sign-in:
    post:
      consumes:
      - application/json
      description: 'Sign in with email and password. Returns JWT for Authorization:
        Bearer &lt;token&gt;. Account must be approved (is_active).'
      parameters:
      - description: email, password
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_transport_rest.authInputDTO'
      produces:
      - application/json
      responses:
        "200":
          description: token
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Sign in
      tags:
      - auth
  /auth/sign-up:
    post:
      consumes:
      - application/json
      description: Register new client. Requires manager approval (is_active).
      parameters:
      - description: email, password (min 8 chars)
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_transport_rest.authInputDTO'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Client registration
      tags:
      - auth
  /client/accounts:
    post:
      consumes:
      - application/json
      description: Opens an account in the given bank. user_id from JWT.
      parameters:
      - description: bank_id
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_transport_rest.openAccountRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/financial_system_internal_domain.Account'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Open account
      tags:
      - client
  /client/accounts/{id}:
    delete:
      consumes:
      - application/json
      description: Closes account (is_blocked=true). Balance must be 0. user_id from
        JWT.
      parameters:
      - description: Account ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Close account
      tags:
      - client
  /client/accounts/history:
    get:
      consumes:
      - application/json
      description: 'Returns transactions for the account. user_id from JWT. Query:
        account_id.'
      parameters:
      - description: Account ID
        in: query
        name: account_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/financial_system_internal_domain.Transaction'
            type: array
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Account history
      tags:
      - client
  /client/accounts/transfer:
    post:
      consumes:
      - application/json
      description: Transfer from account to another account or deposit (same user).
        Provide either to_account_id or to_deposit_id.
      parameters:
      - description: from_account_id, to_account_id or to_deposit_id, amount
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_transport_rest.transferFromAccountRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Transfer from account
      tags:
      - client
  /client/banks:
    get:
      consumes:
      - application/json
      description: Returns all banks. Requires client role and JWT.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/financial_system_internal_domain.Bank'
            type: array
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List banks
      tags:
      - client
  /client/deposits:
    post:
      consumes:
      - application/json
      description: Creates a deposit in a bank with given interest rate. Initial balance
        0.
      parameters:
      - description: bank_id, interest_rate
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_transport_rest.openDepositRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/financial_system_internal_domain.Deposit'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Open deposit
      tags:
      - client
  /client/deposits/{id}:
    delete:
      description: Closes deposit (is_blocked=true). Balance must be 0.
      parameters:
      - description: Deposit ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Close deposit
      tags:
      - client
  /client/deposits/{id}/accumulate:
    post:
      consumes:
      - application/json
      description: Transfers from user account to the deposit (id in path).
      parameters:
      - description: Deposit ID (target)
        in: path
        name: id
        required: true
        type: integer
      - description: from_account_id, amount
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_transport_rest.accumulateDepositRequest'
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Accumulate deposit (top-up from account)
      tags:
      - client
  /client/deposits/transfer:
    post:
      consumes:
      - application/json
      description: Transfer from deposit to account or another deposit (same user).
        Provide exactly one of to_account_id or to_deposit_id.
      parameters:
      - description: from_deposit_id, to_account_id or to_deposit_id, amount
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_transport_rest.transferFromDepositRequest'
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Transfer from deposit
      tags:
      - client
  /client/enterprises:
    get:
      consumes:
      - application/json
      description: Returns all enterprises. Requires client role and JWT.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/financial_system_internal_domain.Enterprise'
            type: array
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List enterprises
      tags:
      - client
  /client/salary-project/apply:
    post:
      consumes:
      - application/json
      description: Creates application with status pending. Only enterprise employee.
      parameters:
      - description: enterprise_id, amount
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_transport_rest.applySalaryProjectRequest'
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/financial_system_internal_domain.SalaryApplication'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Apply for salary project
      tags:
      - client
  /client/salary-project/receive:
    post:
      consumes:
      - application/json
      description: Credits salary for approved application to given account or deposit
        (one of to_account_id, to_deposit_id required).
      parameters:
      - description: application_id, to_account_id or to_deposit_id
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_transport_rest.receiveSalaryRequest'
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Receive salary
      tags:
      - client
  /manager/accounts/{id}/block:
    post:
      parameters:
      - description: Account ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Block account
      tags:
      - manager
  /manager/accounts/{id}/unblock:
    post:
      parameters:
      - description: Account ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Unblock account
      tags:
      - manager
  /manager/deposits/{id}/block:
    post:
      description: Manager can block deposit at any time (no balance check).
      parameters:
      - description: Deposit ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Block deposit
      tags:
      - manager
  /manager/deposits/{id}/unblock:
    post:
      parameters:
      - description: Deposit ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Unblock deposit
      tags:
      - manager
  /manager/enterprises:
    get:
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/financial_system_internal_domain.EnterpriseWithEmployees'
            type: array
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Enterprises with employees
      tags:
      - manager
  /manager/enterprises/{enterprise_id}/employees/{user_id}:
    delete:
      description: Employee's pending applications for this enterprise are rejected.
      parameters:
      - description: Enterprise ID
        in: path
        name: enterprise_id
        required: true
        type: integer
      - description: User ID
        in: path
        name: user_id
        required: true
        type: integer
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Remove employee from enterprise
      tags:
      - manager
  /manager/enterprises/{id}/employees:
    post:
      consumes:
      - application/json
      parameters:
      - description: Enterprise ID
        in: path
        name: id
        required: true
        type: integer
      - description: user_id
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_transport_rest.addEmployeeToEnterpriseRequest'
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Add employee to enterprise
      tags:
      - manager
  /manager/salary-project/applications/{id}/approve:
    post:
      description: Approves application (status = approved). Enterprise balance must
        be >= application amount.
      parameters:
      - description: Application ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Approve salary application
      tags:
      - manager
  /manager/users/{id}/approve:
    post:
      description: Sets is_active = true for user with role client. Client can then
        sign in.
      parameters:
      - description: User (client) ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            additionalProperties:
